<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallel Hero Section</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9f9f9;
    }
    .serif-title {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>
<body class="text-[#1a1a1a] relative overflow-x-hidden">

  <!-- Header / Navigation -->
  <header class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between relative z-50">
    <!-- Logo & Left Link (Desktop Only) -->
    <div class="flex items-center space-x-4">
      <span class="text-2xl font-bold tracking-tight text-black">parallel</span>
      <a href="#" class="hidden md:inline-block bg-[#ededed] text-sm font-medium px-4 py-2 rounded-full hover:bg-gray-200 transition">Explore</a>
    </div>

    <!-- Center Segmented Control (Desktop Only) -->
    <div class="hidden md:flex bg-[#ededed] p-1 rounded-full items-center space-x-1">
      <button class="bg-white text-sm font-medium px-5 py-1.5 rounded-full shadow-sm">Talent</button>
      <button class="text-sm font-medium text-gray-500 px-5 py-1.5 rounded-full hover:text-black transition">Employers</button>
    </div>

    <!-- Right Navigation (Desktop Only) -->
    <div class="hidden md:flex items-center space-x-6">
      <a href="#" class="text-sm font-medium text-gray-700 hover:text-black transition">Sign in</a>
      <a href="#" class="bg-[#ededed] text-sm font-medium px-5 py-2 rounded-full hover:bg-gray-200 transition">Find work</a>
    </div>

    <!-- Hamburger Menu Button (Mobile Only) -->
    <button id="menu-btn" class="block md:hidden text-black focus:outline-none p-2 z-50">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </header>

  <!-- Mobile Full-Screen Navigation Overlay -->
  <div id="mobile-menu" class="fixed inset-0 bg-white z-40 transform translate-x-full transition-transform duration-300 ease-in-out md:hidden flex flex-col justify-between p-6 pt-24">
    <!-- Navigation Links -->
    <div class="flex flex-col space-y-6 text-xl font-medium px-4">
      <a href="#" class="hover:text-gray-600 transition">Explore</a>
      <a href="#" class="hover:text-gray-600 transition">Talent</a>
      <a href="#" class="hover:text-gray-600 transition">Employers</a>
      <hr class="border-gray-200" />
      <a href="#" class="hover:text-gray-600 transition">Sign in</a>
    </div>

    <!-- Call to Action Footer inside Mobile Menu -->
    <div class="px-4 pb-8">
      <a href="#" class="block w-full text-center bg-[#1a1a1a] text-white font-medium py-4 rounded-xl hover:bg-black transition">
        Find work
      </a>
    </div>
  </div>

  <!-- Hero Section -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 pt-12 sm:pt-16 pb-12 text-center">
    <!-- Typography Header -->
    <h1 class="serif-title text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-normal tracking-tight text-[#1a1a1a] mb-4">
      Turn momentum into money.
    </h1>
    <p class="text-gray-500 text-base sm:text-lg md:text-xl font-medium mb-10 sm:mb-12 max-w-md mx-auto sm:max-w-none">
      Access early capital, automate attendee logistics, and keep every moving part in sync.
    </p>

    <!-- Hero Visual Banner Container -->
    <div class="relative w-full h-[260px] sm:h-[400px] md:h-[480px] rounded-[24px] sm:rounded-[32px] overflow-hidden bg-gradient-to-r from-[#b34925] via-[#d97c36] to-[#df9245] flex flex-col items-center justify-center px-4 sm:px-6 shadow-inner">
      
      <div class="absolute inset-0 bg-gradient-to-b from-transparent to-orange-900/20 pointer-events-none"></div>

      <!-- Centered Floating Search Container -->
      <div class="relative z-10 w-full max-w-xl md:max-w-2xl bg-white/95 backdrop-blur-md p-1.5 sm:p-2.5 md:p-3 rounded-2xl md:rounded-3xl shadow-2xl flex items-center justify-between border border-white/40">
        <input 
          type="text" 
          placeholder="Your email for updates & perks" 
          class="w-full bg-transparent pl-3 sm:pl-4 pr-2 py-2 sm:py-3 text-sm sm:text-base md:text-lg text-gray-800 placeholder-gray-400 focus:outline-none"
        />
        <button class="bg-[#f07423] text-white p-2.5 sm:p-3 rounded-xl hover:bg-[#d65f17] transition-all flex items-center justify-center shrink-0 shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 sm:w-5 sm:h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </div>

      <!-- Live Job Metrics Footer -->
      <div class="relative z-10 mt-4 sm:mt-6 flex items-center space-x-1.5 sm:space-x-2 bg-black/10 backdrop-blur-sm px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-white text-[11px] sm:text-xs md:text-sm font-medium tracking-wide">
        <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-[#f07423] inline-block animate-pulse"></span>
        <span>Avg. payout in 6 hours</span>
        <span class="text-white/60">•</span>
        <span class="text-white/90">powering experiences
            
        </span>
      </div>

    </div>
  </main>

  <!-- Simple Mobile Toggle JavaScript -->
  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    menuBtn.addEventListener('click', () => {
      // Toggle side panel drawer visibility
      mobileMenu.classList.toggle('translate-x-full');
      
      // Update Hamburger icon to a close "X" symbol when active
      const isOpen = !mobileMenu.classList.contains('translate-x-full');
      if (isOpen) {
        menuBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        `;
      } else {
        menuBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        `;
      }
    });
  </script>

</body>
</html>
