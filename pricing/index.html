<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallel Pricing Component</title>
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #e5dfd9; /* Muted beige background */
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 20px;
      overflow-x: hidden;
    }

    /* Navbar Styles */
    .navbar {
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 0;
      z-index: 10;
    }

    .logo {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -1px;
      color: #000;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #706d6a;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.2s;
    }

    .nav-links a.active {
      color: #000;
    }

    .nav-auth {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn-signin {
      text-decoration: none;
      color: #000;
      font-weight: 500;
      font-size: 15px;
      padding: 10px 20px;
      background: rgba(0,0,0,0.05);
      border-radius: 8px;
    }

    .btn-try {
      text-decoration: none;
      color: #fff;
      background-color: #1a1a1a;
      font-weight: 500;
      font-size: 15px;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .btn-try:hover {
      background-color: #333;
    }

    /* Hamburger Menu Button */
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 1001;
    }

    .menu-toggle span {
      display: block;
      width: 26px;
      height: 2px;
      background-color: #000;
      transition: all 0.3s ease;
    }

    /* Side Nav Drawer (Mobile Only) */
    .sidenav {
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100vh;
      background-color: #f5f0eb;
      box-shadow: -5px 0 25px rgba(0,0,0,0.08);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      padding: 100px 40px 40px 40px;
      transition: right 0.3s ease-in-out;
    }

    .sidenav.open {
      right: 0;
    }

    .sidenav-links {
      display: flex;
      flex-direction: column;
      gap: 25px;
      margin-bottom: 40px;
    }

    .sidenav-links a {
      text-decoration: none;
      color: #706d6a;
      font-size: 20px;
      font-weight: 500;
    }

    .sidenav-links a.active {
      color: #000;
    }

    .sidenav-auth {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: auto;
    }

    .sidenav-auth .btn-signin,
    .sidenav-auth .btn-try {
      text-align: center;
      padding: 14px;
      font-size: 16px;
    }

    /* Overlay Backdrop */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Hero Headline */
    .hero-section {
      text-align: center;
      margin-top: 60px;
      margin-bottom: 50px;
    }

    .hero-section h2 {
      font-size: 48px;
      color: #706d6a;
      font-weight: 400;
      margin-bottom: 5px;
    }

    .hero-section h1 {
      font-size: 56px;
      color: #000;
      font-weight: 600;
      letter-spacing: -1px;
    }

    /* Pricing Card Styles */
    .pricing-card {
      background-color: #ffffff;
      width: 100%;
      max-width: 820px;
      border-radius: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 50px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      margin-bottom: 100px;
    }

    /* Left Side: Price Details */
    .price-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid #eaeaea;
      padding-right: 40px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 25px;
    }

    .currency-amount {
      font-size: 90px;
      font-weight: 600;
      letter-spacing: -3px;
      line-height: 1;
    }

    .period {
      font-size: 32px;
      color: #706d6a;
      font-weight: 400;
      margin-left: 4px;
    }

    .trial-text {
      color: #706d6a;
      font-size: 14px;
    }

    .trial-text span {
      color: #000;
      font-weight: 500;
    }

    /* Right Side: Features & CTA */
    .features-container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-left: 40px;
    }

    .features-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 10px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      font-size: 17px;
      color: #1a1a1a;
      font-weight: 400;
    }

    /* Custom Checkmark Icon */
    .checkmark {
      width: 20px;
      height: 20px;
      background-color: #000;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .checkmark::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    /* CTA Button with Gradient */
    .btn-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #000;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      padding: 16px;
      border-radius: 12px;
      margin-top: 30px;
      transition: opacity 0.2s;
    }

    .btn-cta:hover {
      opacity: 0.95;
    }

    /* Hamburger Animation States */
    .menu-toggle.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }
    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }
    .menu-toggle.active span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .nav-links, .nav-auth {
        display: none; /* Hide standard nav items */
      }

      .menu-toggle {
        display: flex; /* Show Hamburger button */
      }

      .hero-section {
        margin-top: 30px;
        margin-bottom: 35px;
      }

      .hero-section h2 {
        font-size: 36px;
      }

      .hero-section h1 {
        font-size: 40px;
      }

      .pricing-card {
        grid-template-columns: 1fr;
        gap: 35px;
        padding: 40px 25px;
      }

      .price-container {
        border-right: none;
        border-bottom: 1px solid #eaeaea;
        padding-right: 0;
        padding-bottom: 35px;
        align-items: center;
      }

      .currency-amount {
        font-size: 76px;
      }

      .features-container {
        padding-left: 0;
      }

      .btn-cta {
        margin-top: 40px;
      }
    }
  </style>
</head>
<body>

  <!-- Backdrop Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Navigation Bar -->
  <header class="navbar">
    <a href="#" class="logo">tixtee. Roadmap</a>
    
    <!-- Desktop Navigation -->
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="#">Solutions</a>
      <a href="#" class="active">Resources.</a>
    </nav>
    <div class="nav-auth">
      <a href="#" class="btn-signin">Sign in</a>
      <a href="#" class="btn-try">Try free</a>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Mobile Slide-out Side Navigation -->
  <div class="sidenav" id="sideNav">
    <nav class="sidenav-links">
      <a href="/">Home</a>
      <a href="#">Solutions</a>
      <a href="#" class="active">Resources</a>
    </nav>
    <div class="sidenav-auth">
      <a href="#" class="btn-signin">Sign in</a>
      <a href="#" class="btn-try">Try free</a>
    </div>
  </div>

  <section class="hero-section">
    <h2>One Price</h2>
    <h1>Everything Included</h1>
  </section>

  <main class="pricing-card">
    
    <div class="price-container">
      <div class="price-row">
        <span class="currency-amount">₦27,561</span>
        <span class="period">/mo</span>
      </div>
      <div class="trial-text">
        Free <span>1 month</span> &bull; Set up in minutes
      </div>
    </div>

    <!-- Right column: Feature sets and Action Button -->
    <div class="features-container">
      <ul class="features-list">
        <li class="feature-item">
          <span class="checkmark"></span>
          Unlimited job postings
        </li>
        <li class="feature-item">
          <span class="checkmark"></span>
          Unlimited seats
        </li>
        <li class="feature-item">
          <span class="checkmark"></span>
          Pause or cancel anytime
        </li>
      </ul>
      
      <a href="#" class="btn-cta">Start free trial &rarr;</a>
    </div>

  </main>

  <!-- JavaScript to trigger Side Nav Toggle -->
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const sideNav = document.getElementById('sideNav');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
      menuToggle.classList.toggle('active');
      sideNav.classList.toggle('open');
      overlay.classList.toggle('show');
    }

    menuToggle.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
  </script>

</body>
</html>
